<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Last Seed - Urban Eco Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <div id="vignette"></div>
        <div id="light-rays" class="ambient-fx"></div>
        <div id="toxic-smog" class="ambient-fx hidden"></div>
        <div id="damage-overlay" class="hidden"></div>
        <div id="flash-fx" class="hidden"></div>

        <div id="screen-start" class="screen">
            <div class="title-container">
                <h1>THE LAST SEED</h1>
                <p class="subtitle">Consciência Urbana & Sobrevivência</p>
            </div>
            <div class="menu-buttons">
                <button id="btn-main-play" class="btn-action pulse">INICIAR JORNADA</button>
                <button class="btn-action secondary">SOBRE O PROJETO</button>
            </div>
        </div>

        <div id="screen-char-select" class="screen hidden">
            <h2 class="cinematic-title">ESCOLHA SEU AGENTE</h2>
            <p class="cinematic-subtitle">Quem irá lutar pelo equilíbrio da cidade?</p>
            <div class="char-grid" id="char-options"></div>
            <button id="btn-confirm-char" class="btn-action" disabled>CONFIRMAR</button>
        </div>

        <div id="screen-bot-select" class="screen hidden">
            <h2 class="cinematic-title">ESCOLHA OS ADVERSÁRIOS</h2>
            <p class="cinematic-subtitle">A cidade está cheia de variáveis. Selecione os robôs:</p>
            <div class="bot-grid" id="bot-options"></div>
            <button id="btn-start-game" class="btn-action">ENTRAR NO MUNDO</button>
        </div>

        <div id="decision-modal" class="hidden decision-card">
            <div class="card-header">
                <div id="decision-icon"></div>
                <h2 id="decision-title">SITUAÇÃO URBANA</h2>
            </div>
            <div id="decision-visual-context"></div>
            <p id="decision-desc"></p>
            <div id="decision-options" class="options-vertical"></div>
        </div>

        <div id="game-ui" class="hidden">
            <div id="world-health-ui">
                <div id="world-title">EQUILÍBRIO DO PLANETA</div>
                <div class="health-track"><div id="health-bar"></div></div>
                <div id="world-status-text">Florescendo</div>
            </div>

            <div id="player-hud" class="ui-box">
                <div class="hud-header" id="current-player-name">JOGADOR</div>
                <div class="lives-container" id="player-lives"></div>
                <div class="hud-status" id="player-status">ESTÁVEL</div>
            </div>

            <div id="dice-panel" class="ui-box">
                <div class="panel-header" id="dice-owner-text">AGUARDANDO</div>
                <div id="dice-render-area">
                    <div id="physical-dice" class="hidden"><span id="physical-dice-val">1</span></div>
                </div>
                <button id="btn-roll-dice" class="btn-action" disabled>ROLAR DADO</button>
            </div>
        </div>

        <div id="bot-educational-feed"></div>
        <div id="cinematic-message" class="hidden">
            <h1 id="cine-title"></h1>
            <p id="cine-desc"></p>
        </div>

        <div id="persistent-end-ui" class="hidden">
            <div id="final-ranking" class="hidden"></div>
            <button id="btn-restart-game" class="hidden">RECOMEÇAR</button>
        </div>
    </div>

    <img src="img/folha_verde.png" id="img-folha" class="hidden" alt="folha">
    
    <script src="script.js"></script>
</body>
</html>
